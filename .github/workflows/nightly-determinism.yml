name: Nightly — reproduce determinism

# Proves REPRODUCE STABILITY (FR-CON-012 / F-01): running the full --reproduce
# pipeline twice against the committed pins yields a byte-identical artifact set.
# This is what lets any independent agent re-run --reproduce and get consistent
# Evidence. It intentionally does NOT compare against the committed tree, because
# the daily census legitimately commits a fresh *live* observation (real
# timestamps); determinism is about reproduce→reproduce, not reproduce==live.
# Needs network + gh (fetches pinned repository contents), so it is scheduled.

on:
  schedule:
    - cron: '30 5 * * *'   # daily 05:30 UTC, before the census commit at 06:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce-fixpoint:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install ripgrep (required tool per §11.1)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify reproduce stability (two reproduce passes must match)
        run: bash scripts/verify-determinism.sh
